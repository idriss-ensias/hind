<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Under Construction</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --fg: #ffe8e8;
    --fg2: #cc6666;
    --dim: #4a1a1a;
    --bg: #0c0808;
    --accent: #ff4455;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    color: var(--fg);
    gap: 32px;
    padding: 40px 20px;
    overflow: hidden;
    position: relative;
  }

  #hearts-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .controls, #stage, #love-line, #hint {
    position: relative;
    z-index: 1;
  }

  #love-line {
    font-size: 18px;
    letter-spacing: 0.45em;
    color: #ff4455;
    text-shadow: 0 0 12px #ff445588;
    text-transform: lowercase;
    animation: lovepulse 1.55s ease-in-out infinite;
  }

  @keyframes lovepulse {
    0%, 100% { opacity: 0.7; text-shadow: 0 0 8px #ff445566; }
    50%       { opacity: 1.0; text-shadow: 0 0 20px #ff4455cc; }
  }

  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  input[type="text"]#name-input {
    font-family: 'Share Tech Mono', monospace;
    font-size: 17px;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--dim);
    color: var(--fg);
    padding: 6px 2px;
    outline: none;
    width: 240px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: border-color 0.2s;
  }
  input[type="text"]#name-input:focus { border-color: var(--accent); }

  input[type="text"]#char-input {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--dim);
    color: var(--accent);
    padding: 4px 2px;
    outline: none;
    width: 30px;
    text-align: center;
    transition: border-color 0.2s;
  }
  input[type="text"]#char-input:focus { border-color: var(--accent); }

  label { font-size: 12px; color: var(--dim); letter-spacing: 0.25em; }

  button {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.15em;
    background: transparent;
    color: var(--fg2);
    border: 1px solid var(--dim);
    padding: 7px 18px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }


  #stage {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  pre#output {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(7px, 1.5vw, 13px);
    line-height: 1.18;
    white-space: pre;
    letter-spacing: 0.06em;
    color: var(--accent);
    text-shadow: 0 0 6px #ff445577;
    transform-origin: center center;
    will-change: transform, filter;
  }

  #hint {
    font-size: 13px;
    color: #ff4455;
    letter-spacing: 0.28em;
    text-transform: lowercase;
    opacity: 0.6;
  }
</style>
</head>
<body>

<canvas id="hearts-canvas"></canvas>

<div id="stage"><pre id="output"></pre></div>


</html>
