    --fg2: #cc6666;

    --bg: #0c0808;

    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    color: var(--fg);
    gap: 32px;
    padding: 40px 20px;
    overflow: hidden;
    position: relative;
  }

  #hearts-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  #love-line {

    letter-spacing: 0.45em;
    color: #ff4455;
    text-shadow: 0 0 12px #ff445588;
    text-transform: lowercase;
    animation: lovepulse 1.55s ease-in-out infinite;

    0%, 100% { opacity: 0.7; text-shadow: 0 0 8px #ff445566; }
    50%       { opacity: 1.0; text-shadow: 0 0 20px #ff4455cc; }
  }

  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  input[type="text"]#name-input {
    font-family: 'Share Tech Mono', monospace;
    font-size: 17px;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--dim);
    color: var(--fg);
    padding: 6px 2px;
    outline: none;
    width: 240px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: border-color 0.2s;
  }
  input[type="text"]#name-input:focus { border-color: var(--accent); }

  input[type="text"]#char-input {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--dim);
    color: var(--accent);
    padding: 4px 2px;
    outline: none;
    width: 30px;
    text-align: center;
    transition: border-color 0.2s;
  }
  input[type="text"]#char-input:focus { border-color: var(--accent); }

  label { font-size: 12px; color: var(--dim); letter-spacing: 0.25em; }

  button {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.15em;
    background: transparent;
    color: var(--fg2);
    border: 1px solid var(--dim);
    padding: 7px 18px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }


  #stage {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  pre#output {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(7px, 1.5vw, 13px);
    line-height: 1.18;
    white-space: pre;
    letter-spacing: 0.06em;
    color: var(--accent);
    text-shadow: 0 0 6px #ff445577;
    transform-origin: center center;
    will-change: transform, filter;
  }

  #hint {
    font-size: 13px;
    color: #ff4455;
    letter-spacing: 0.28em;
    text-transform: lowercase;
    opacity: 0.6;

function buildRows(text, ch) {
  const rows = Array.from({length: 9}, () => '');
  for (const letter of text.toUpperCase()) {
    const bmp = F[letter] || F['?'];
    for (let r = 0; r < 9; r++) {
      rows[r] += bmp[r].replace(/1/g, ch).replace(/0/g, ' ') + ' ';
    }
  }
  return rows.join('\n');
}

// ── Heartbeat animation ────────────────────────────────────────────────────
// A real cardiac-style double-thump (lub-dub), then relax

const pre = document.getElementById('output');
let animFrame = null;
let currentText = '';
let currentChar = '@';

// Heartbeat keyframes: [scale, brightness, time_offset_ms]
// Mimics the lub-dub waveform: quick rise, partial fall, second rise, full fall
const BEAT = [
  // resting
  { s: 1.00, b: 1.0,  t: 0    },
  // lub (first thump — bigger)
  { s: 1.18, b: 1.6,  t: 80   },
  { s: 1.08, b: 1.2,  t: 160  },
  // dub (second thump — smaller)
  { s: 1.13, b: 1.45, t: 260  },
  { s: 1.02, b: 1.05, t: 360  },
  // settle back
  { s: 1.00, b: 1.0,  t: 460  },
];

const BPM = 62;
const CYCLE = Math.round(60000 / BPM); // ~968ms

let beatStart = null;
let nextBeatAt = 0;

function lerp(a, b, t) { return a + (b - a) * t; }
let lastBeatSpawn = 0;

function getFrameProps(elapsed) {
  // Find where we are in the BEAT sequence
  const last = BEAT[BEAT.length - 1];
  if (elapsed >= last.t) return { s: 1.0, b: 1.0 };

  for (let i = 0; i < BEAT.length - 1; i++) {
    const k0 = BEAT[i], k1 = BEAT[i + 1];
    if (elapsed >= k0.t && elapsed < k1.t) {
      const p = (elapsed - k0.t) / (k1.t - k0.t);
      // ease in-out cubic
      const e = p < 0.5 ? 4*p*p*p : 1 - Math.pow(-2*p+2,3)/2;
      return {
        s: lerp(k0.s, k1.s, e),
        b: lerp(k0.b, k1.b, e),
      };
    }
  }
  return { s: 1.0, b: 1.0 };
}

function animate(ts) {
  if (!beatStart) beatStart = ts;
  const now = ts - beatStart;

  if (now >= nextBeatAt) {
    nextBeatAt += CYCLE;
  }

  const elapsed = now - (nextBeatAt - CYCLE);
  const { s, b } = getFrameProps(elapsed);

  pre.style.transform = `scale(${s.toFixed(4)})`;

  const base = [255, 40, 70];
  const peak = [255, 200, 200];
  const t = Math.min(1, Math.max(0, (b - 1.0) / 0.7));
  const r = Math.round(lerp(base[0], peak[0], t));
  const g = Math.round(lerp(base[1], peak[1], t));
  const bv = Math.round(lerp(base[2], peak[2], t));
  pre.style.color = `rgb(${r},${g},${bv})`;

  const glow = Math.round(6 + t * 22);
  pre.style.textShadow = `0 0 ${glow}px rgba(${r},${g},${bv},0.7)`;

  if (ts - lastBeatSpawn > CYCLE * 0.85) {
    spawnHeart(); spawnHeart();
    lastBeatSpawn = ts;
  }

  animFrame = requestAnimationFrame(animate);
}

function startAnimation() {
  if (animFrame) cancelAnimationFrame(animFrame);
  beatStart = null;
  nextBeatAt = 0;
  animFrame = requestAnimationFrame(animate);
}

function triggerRender() {
  pre.textContent = buildRows('HIND', '@');
  currentText = 'HIND';
  currentChar = '@';
  startAnimation();
}

// Boot
triggerRender();

// ── Floating <3 hearts ────────────────────────────────────────────────────

const hCanvas = document.getElementById('hearts-canvas');
const hCtx = hCanvas.getContext('2d');

function resizeHearts() {
  hCanvas.width  = window.innerWidth;
  hCanvas.height = window.innerHeight;
}
resizeHearts();
window.addEventListener('resize', resizeHearts);

const HEART_TEXTS = ['<3', '<3', '<3', '♥', '<3'];
const hearts = [];

function spawnHeart() {
  hearts.push({
    x: Math.random() * window.innerWidth,
    y: window.innerHeight + 20,
    text: HEART_TEXTS[Math.floor(Math.random() * HEART_TEXTS.length)],
    size: 12 + Math.random() * 18,
    speed: 0.6 + Math.random() * 1.0,
    drift: (Math.random() - 0.5) * 0.6,
    alpha: 0.5 + Math.random() * 0.5,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: 0.02 + Math.random() * 0.02,
  });
}

// Spawn hearts periodically, and also sync a burst with the beat
setInterval(spawnHeart, 600);

function drawHearts() {
  hCtx.clearRect(0, 0, hCanvas.width, hCanvas.height);
  hCtx.font = `bold 14px 'Share Tech Mono', monospace`;

  for (let i = hearts.length - 1; i >= 0; i--) {
    const h = hearts[i];
    h.y -= h.speed;
    h.x += h.drift + Math.sin(h.wobble) * 0.4;
    h.wobble += h.wobbleSpeed;
    h.alpha -= 0.0015;

    if (h.alpha <= 0 || h.y < -30) { hearts.splice(i, 1); continue; }

    hCtx.save();
    hCtx.globalAlpha = h.alpha;
    hCtx.font = `bold ${Math.round(h.size)}px 'Share Tech Mono', monospace`;
    // red glow
    hCtx.shadowColor = '#ff2244';
    hCtx.shadowBlur = 8;
    hCtx.fillStyle = `hsl(${350 + Math.sin(h.wobble) * 10}, 100%, ${55 + h.alpha * 20}%)`;
    hCtx.fillText(h.text, h.x, h.y);
    hCtx.restore();
  }

  requestAnimationFrame(drawHearts);
}
drawHearts();

// Boot
triggerRender();
</script>
